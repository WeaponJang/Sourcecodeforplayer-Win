name: Build AVS3 Codec (Windows)

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        configuration: [Release]
        platform: [x64, x86]

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    # 修复 Windows 下缺少 clock_gettime 和 CLOCK_MONOTONIC 的问题
    - name: Patch POSIX timers for Windows
      run: |
        $compatCode = @'
        #ifdef _WIN32
        #include <windows.h>
        #include <time.h>
        #ifndef CLOCK_MONOTONIC
        #define CLOCK_MONOTONIC 0
        #endif
        static inline int clock_gettime(int clk, struct timespec* t) {
            LARGE_INTEGER freq, now;
            QueryPerformanceFrequency(&freq);
            QueryPerformanceCounter(&now);
            t->tv_sec = (long)(now.QuadPart / freq.QuadPart);
            t->tv_nsec = (long)((now.QuadPart % freq.QuadPart) * 1000000000 / freq.QuadPart);
            return 0;
        }
        #endif

        '@
        
        $files = @(
          "av3adecoder/avs3Decoder/src/decoder.c", 
          "av3adecoder/avs3Encoder/src/encoder.c"
        )
        
        foreach ($file in $files) {
          if (Test-Path $file) {
            $content = Get-Content $file -Raw
            if ($content -notmatch "#ifdef _WIN32") {
              $content = $compatCode + $content
              Set-Content $file -Value $content
            }
          }
        }

    - name: Build AVS3_Codec.sln
      run: msbuild av3adecoder/AVS3_Codec.sln `
        /p:Configuration=${{ matrix.configuration }} `
        /p:Platform=${{ matrix.platform }} `
        /m /v:minimal

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: avs3-${{ matrix.platform }}-${{ matrix.configuration }}
        path: |
          av3adecoder/avs3Decoder/${{ matrix.platform == 'x86' && 'Win32' || 'x64' }}/${{ matrix.configuration }}/*.exe
          av3adecoder/avs3Encoder/${{ matrix.platform == 'x86' && 'Win32' || 'x64' }}/${{ matrix.configuration }}/*.exe
        if-no-files-found: error
