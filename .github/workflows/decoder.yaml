name: Build AVS3 Decoder (Windows)

on:
  push:
    branches: ["master"]
    paths:
      - "av3adecoder/avs3Decoder/**"
      - ".github/workflows/build-avs3-decoder.yml"
  pull_request:
    branches: ["master"]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        configuration: [Release]
        platform: [x64]

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    # 1. 修复 Windows 下缺少 clock_gettime 的问题 (仅处理 decoder.c)
    - name: Patch POSIX timers for Windows
      run: |
        $compatCode = @'
        #ifdef _WIN32
        #include <windows.h>
        #include <time.h>
        #ifndef CLOCK_MONOTONIC
        #define CLOCK_MONOTONIC 0
        #endif
        static inline int clock_gettime(int clk, struct timespec* t) {
            LARGE_INTEGER freq, now;
            QueryPerformanceFrequency(&freq);
            QueryPerformanceCounter(&now);
            t->tv_sec = (long)(now.QuadPart / freq.QuadPart);
            t->tv_nsec = (long)((now.QuadPart % freq.QuadPart) * 1000000000 / freq.QuadPart);
            return 0;
        }
        #endif

        '@
        
        $file = "av3adecoder/avs3Decoder/src/decoder.c"
        if (Test-Path $file) {
          $content = Get-Content $file -Raw
          if ($content -notmatch "#ifdef _WIN32") {
            $content = $compatCode + $content
            Set-Content $file -Value $content
          }
        }

   
    # 2. 单独编译 avs3Decoder
    - name: Build avs3Decoder
      run: msbuild av3adecoder/avs3Decoder/avs3Decoder.vcxproj `
        /p:Configuration=${{ matrix.configuration }} `
        /p:Platform=${{ matrix.platform }} `
        /m /v:minimal

    # 3. 上传解码器产物
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: avs3-decoder-${{ matrix.platform }}-${{ matrix.configuration }}
        path: |
          av3adecoder/avs3Decoder/x64/${{ matrix.configuration }}/*.exe
        if-no-files-found: error
